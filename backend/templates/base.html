<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="AgroMind Rural — Inteligência agrícola de precisão para o agronegócio moderno." />
    <title>{% block title %}AgroMind Rural{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts: Space Grotesk + Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Tailwind Config: Deep Earth Palette -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#54e98a",
                        "primary-container": "#2ecc71",
                        "primary-fixed": "#6bfe9c",
                        "primary-fixed-dim": "#4ae183",
                        "on-primary": "#003919",
                        "on-primary-container": "#005027",
                        "on-primary-fixed": "#00210c",
                        "on-primary-fixed-variant": "#005228",
                        "inverse-primary": "#006d37",
                        "secondary": "#92ccff",
                        "secondary-container": "#3398db",
                        "secondary-fixed": "#cce5ff",
                        "secondary-fixed-dim": "#92ccff",
                        "on-secondary": "#003351",
                        "on-secondary-container": "#002c47",
                        "on-secondary-fixed": "#001d31",
                        "on-secondary-fixed-variant": "#004b73",
                        "tertiary": "#f2ca50",
                        "tertiary-container": "#d4af37",
                        "tertiary-fixed": "#ffe088",
                        "tertiary-fixed-dim": "#e9c349",
                        "on-tertiary": "#3c2f00",
                        "on-tertiary-container": "#554300",
                        "on-tertiary-fixed": "#241a00",
                        "on-tertiary-fixed-variant": "#574500",
                        "surface": "#131313",
                        "surface-dim": "#131313",
                        "surface-bright": "#3a3939",
                        "surface-container": "#201f1f",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "surface-variant": "#353534",
                        "surface-tint": "#4ae183",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#bbcbbb",
                        "on-background": "#e5e2e1",
                        "background": "#131313",
                        "outline": "#869486",
                        "outline-variant": "#3d4a3e",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "0.75rem",
                    },
                },
            },
        }
    </script>

    <style>
        /* Material Symbols Config */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Grain Overlay — premium texture */
        .grain-overlay {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
        }

        /* Glass Card */
        .glass-card {
            background: rgba(32, 31, 31, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Marquee animation for commodity ticker */
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            animation: marquee 30s linear infinite;
        }

        /* Fade In Up animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        .delay-300 {
            animation-delay: 0.3s;
        }

        .delay-400 {
            animation-delay: 0.4s;
        }

        .delay-500 {
            animation-delay: 0.5s;
        }

        .delay-600 {
            animation-delay: 0.6s;
        }

        .delay-700 {
            animation-delay: 0.7s;
        }

        /* Pulse glow */
        @keyframes pulseGlow {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .animate-pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite;
        }

        /* Data stream particle */
        @keyframes streamParticle {
            0% {
                left: 0;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                left: 100%;
                opacity: 0;
            }
        }

        .data-stream-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #54e98a;
            border-radius: 50%;
            filter: blur(1px);
            animation: streamParticle 3s linear infinite;
        }

        /* Shimmer effect */
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(84, 233, 138, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        /* BCrypt scramble text effect */
        @keyframes scrambleText {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.3;
            }
        }

        .scramble-text {
            animation: scrambleText 1.5s ease-in-out infinite;
        }

        /* Loader */
        .page-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0e0e0e;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .page-loader.loaded {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes seedGrow {
            0% {
                transform: scale(0.5) translateY(10px);
                opacity: 0;
            }

            50% {
                transform: scale(1.1) translateY(-5px);
                opacity: 1;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .seed-icon {
            animation: seedGrow 1.2s ease-out forwards;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #131313;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3d4a3e;
        }

        /* Selection */
        ::selection {
            background: #54e98a;
            color: #003919;
        }

        /* Django form input styling override */
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid #3d4a3e !important;
            padding: 0.75rem 0 !important;
            color: white !important;
            font-family: 'Inter', sans-serif !important;
            font-size: 0.95rem !important;
            width: 100% !important;
            outline: none !important;
            transition: border-color 0.3s ease !important;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            border-color: #54e98a !important;
            box-shadow: none !important;
            outline: none !important;
        }
        input::placeholder {
                color: #353534 !important;
            }

        /* Fix: opções de <select> visíveis no tema escuro (Windows renderiza dropdown nativo) */
        select option,
        select optgroup {
            background-color: #1c1b1b !important;
            color: #e5e2e1 !important;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col overflow-x-hidden">

    <!-- Grain Overlay -->
    <div class="grain-overlay"></div>

    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="flex flex-col items-center gap-4">
            <div class="seed-icon">
                <span class="material-symbols-outlined text-primary text-6xl">eco</span>
            </div>
            <span class="font-headline font-bold text-xl tracking-tighter text-white uppercase">AgroMind</span>
            <span class="font-label text-[10px] tracking-[0.2em] text-primary uppercase">Carregando...</span>
        </div>
    </div>

    <!-- Background Atmospheric Elements -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[100px]"></div>
    </div>

    {% block body %}
    {% endblock %}

    <!-- Loader dismiss script -->
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                var loader = document.getElementById('pageLoader');
                if (loader) loader.classList.add('loaded');
            }, 600);
        });
    </script>

    {% block extra_js %}{% endblock %}

<script>
async function login(email, password) {
    const response = await fetch('/api/token/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            username: email,   // ou email dependendo do backend
            password: password
        })
    });

    const data = await response.json();

    if (response.ok) {
        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);

        // redireciona
        window.location.href = "/usuarios/dashboard/";
    } else {
        alert("Login inválido");
    }
}
</script>






</body>

</html>
