<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova senha — AgroGestão</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #2d6a2d; font-size: 1.8rem; }
        .logo p  { color: #666; font-size: 0.9rem; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1.2rem; }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #2d6a2d; }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #2d6a2d;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #245424; }
        .errors {
            background: #fff3f3;
            border: 1px solid #f5c6c6;
            border-radius: 5px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            color: #c0392b;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🌱 AgroGestão</h1>
        <p>Defina sua nova senha</p>
    </div>

    {% if form.non_field_errors %}
        <div class="errors">
            {% for error in form.non_field_errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nova senha</label>
            {{ form.new_password1 }}
        </div>
        <div class="form-group">
            <label>Confirme a nova senha</label>
            {{ form.new_password2 }}
        </div>
        <button type="submit" class="btn">Redefinir senha</button>
    </form>
</div>
</body>
</html>
